syntax = "proto3";

package auth.v1;

import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/timestamp.proto";

option go_package = "template-v6/server/admin-service/api/auth/v1;v1";
option java_multiple_files = true;
option java_package = "auth.v1";
option objc_class_prefix = "APIAuthV1";

// AuthService provides the first admin sign-in integration endpoints.
service AuthService {
  // Login authenticates a user with username and password.
  rpc Login(LoginRequest) returns (LoginReply) {
    option (google.api.http) = {
      post: "/api/login/account"
      body: "*"
    };
  }

  // CurrentUser returns the signed-in user for the bearer token.
  rpc CurrentUser(CurrentUserRequest) returns (CurrentUserReply) {
    option (google.api.http) = {
      get: "/api/currentUser"
    };
  }

  // OutLogin accepts a logout request.
  rpc OutLogin(OutLoginRequest) returns (OutLoginReply) {
    option (google.api.http) = {
      post: "/api/login/outLogin"
      body: "*"
    };
  }
}

message LoginRequest {
  string username = 1 [(google.api.field_behavior) = REQUIRED];
  string password = 2 [(google.api.field_behavior) = REQUIRED];
  bool auto_login = 3;
  string type = 4;
}

message LoginReply {
  string status = 1;
  string type = 2;
  string current_authority = 3;
  string token = 4;
  google.protobuf.Timestamp expires_at = 5;
  string error_message = 6;
}

message CurrentUserRequest {}

message CurrentUserReply {
  CurrentUser data = 1;
}

message CurrentUser {
  string userid = 1;
  string name = 2;
  string username = 3;
  string avatar = 4;
  string access = 5;
  string role = 6;
  string status = 7;
  repeated string menu_permissions = 8;
  repeated string button_permissions = 9;
  repeated string role_codes = 10;
  repeated CurrentUserMenu menus = 11;
}

message CurrentUserMenu {
  string id = 1;
  string parent_id = 2;
  string type = 3;
  string name = 4;
  string path = 5;
  string component = 6;
  string permission_code = 7;
  string icon = 8;
  int32 sort = 9;
  string status = 10;
  repeated CurrentUserMenu children = 11;
}

message OutLoginRequest {}

message OutLoginReply {
  bool success = 1;
}
