syntax = "proto3";

package system.v1;

import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

option go_package = "template-v6/server/admin-service/api/system/v1;v1";
option java_multiple_files = true;
option java_package = "system.v1";
option objc_class_prefix = "APISystemV1";

service UserService {
  rpc ListUsers(ListUsersRequest) returns (ListUsersReply) {
    option (google.api.http) = {
      get: "/api/system/users"
    };
  }

  rpc GetUser(GetUserRequest) returns (User) {
    option (google.api.http) = {
      get: "/api/system/users/{id}"
    };
  }

  rpc CreateUser(CreateUserRequest) returns (User) {
    option (google.api.http) = {
      post: "/api/system/users"
      body: "*"
    };
  }

  rpc UpdateUser(UpdateUserRequest) returns (User) {
    option (google.api.http) = {
      put: "/api/system/users/{id}"
      body: "*"
    };
  }

  rpc DeleteUser(DeleteUserRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/system/users/{id}"
    };
  }

  rpc ResetUserPassword(ResetUserPasswordRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/system/users/{id}/password"
      body: "*"
    };
  }

  rpc UpdateUserRoles(UpdateUserRolesRequest) returns (User) {
    option (google.api.http) = {
      put: "/api/system/users/{id}/roles"
      body: "*"
    };
  }
}

message User {
  string id = 1;
  string username = 2;
  string display_name = 3;
  string avatar = 4;
  string email = 5;
  string phone = 6;
  string status = 7;
  repeated string role_ids = 8;
  repeated string role_codes = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
}

message ListUsersRequest {}

message ListUsersReply {
  repeated User data = 1;
}

message GetUserRequest {
  string id = 1 [(google.api.field_behavior) = REQUIRED];
}

message CreateUserRequest {
  string username = 1 [(google.api.field_behavior) = REQUIRED];
  string display_name = 2 [(google.api.field_behavior) = REQUIRED];
  string password = 3 [(google.api.field_behavior) = REQUIRED];
  string avatar = 4;
  string email = 5;
  string phone = 6;
  string status = 7;
  repeated string role_ids = 8;
}

message UpdateUserRequest {
  string id = 1 [(google.api.field_behavior) = REQUIRED];
  string display_name = 2 [(google.api.field_behavior) = REQUIRED];
  string avatar = 3;
  string email = 4;
  string phone = 5;
  string status = 6;
}

message DeleteUserRequest {
  string id = 1 [(google.api.field_behavior) = REQUIRED];
}

message ResetUserPasswordRequest {
  string id = 1 [(google.api.field_behavior) = REQUIRED];
  string password = 2 [(google.api.field_behavior) = REQUIRED];
}

message UpdateUserRolesRequest {
  string id = 1 [(google.api.field_behavior) = REQUIRED];
  repeated string role_ids = 2;
}
