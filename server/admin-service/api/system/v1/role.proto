syntax = "proto3";

package system.v1;

import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

option go_package = "template-v6/server/admin-service/api/system/v1;v1";
option java_multiple_files = true;
option java_package = "system.v1";
option objc_class_prefix = "APISystemV1";

service RoleService {
  rpc ListRoles(ListRolesRequest) returns (ListRolesReply) {
    option (google.api.http) = {
      get: "/api/system/roles"
    };
  }

  rpc GetRole(GetRoleRequest) returns (Role) {
    option (google.api.http) = {
      get: "/api/system/roles/{id}"
    };
  }

  rpc CreateRole(CreateRoleRequest) returns (Role) {
    option (google.api.http) = {
      post: "/api/system/roles"
      body: "*"
    };
  }

  rpc UpdateRole(UpdateRoleRequest) returns (Role) {
    option (google.api.http) = {
      put: "/api/system/roles/{id}"
      body: "*"
    };
  }

  rpc DeleteRole(DeleteRoleRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/system/roles/{id}"
    };
  }

  rpc UpdateRolePermissions(UpdateRolePermissionsRequest) returns (Role) {
    option (google.api.http) = {
      put: "/api/system/roles/{id}/permissions"
      body: "*"
    };
  }
}

message Role {
  string id = 1;
  string code = 2;
  string name = 3;
  string description = 4;
  string status = 5;
  repeated string permission_ids = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

message ListRolesRequest {}

message ListRolesReply {
  repeated Role data = 1;
}

message GetRoleRequest {
  string id = 1 [(google.api.field_behavior) = REQUIRED];
}

message CreateRoleRequest {
  string code = 1 [(google.api.field_behavior) = REQUIRED];
  string name = 2 [(google.api.field_behavior) = REQUIRED];
  string description = 3;
  string status = 4;
}

message UpdateRoleRequest {
  string id = 1 [(google.api.field_behavior) = REQUIRED];
  string code = 2 [(google.api.field_behavior) = REQUIRED];
  string name = 3 [(google.api.field_behavior) = REQUIRED];
  string description = 4;
  string status = 5;
}

message DeleteRoleRequest {
  string id = 1 [(google.api.field_behavior) = REQUIRED];
}

message UpdateRolePermissionsRequest {
  string id = 1 [(google.api.field_behavior) = REQUIRED];
  repeated string permission_ids = 2;
}
