                    format: date-time
        todo.v1.SyncTodoRequest:
            type: object
            properties:
                action:
                    type: string
                    description: The operation to perform. One of `create`, `update`, or `delete`.
                todo:
                    allOf:
                        - $ref: '#/components/schemas/todo.v1.Todo'
                    description: Payload for `create` and `update` actions. Ignored for `delete`.
                id:
                    type: string
                    description: Identifier of the target todo. Required for `delete` and `update`.
                updateMask:
                    type: string
                    description: |-
                        Field mask used by `update` actions to limit which fields are overwritten.
                         Ignored for `create` and `delete`.
                    format: field-mask
            description: |-
                SyncTodoRequest is a single client message in the SyncTodos bidirectional
                 stream. The action field selects which operation to perform on the server.
        todo.v1.Todo:
            type: object
            properties:
                id:
                    type: string
                    description: Server-assigned unique identifier. Read-only on create.
                title:
                    type: string
                    description: Short human-readable title.
                content:
                    type: string
                    description: Detailed description or notes for the todo item.
                completed:
                    type: boolean
                    description: Whether the todo item has been completed.
                createTime:
                    type: string
                    description: Time at which the todo item was created. Server-assigned, read-only.
                    format: date-time
                updateTime:
                    type: string
                    description: Time at which the todo item was last modified. Server-assigned, read-only.
                    format: date-time
            description: Todo is the canonical representation of a todo item.
        todo.v1.TodoEvent:
            type: object
            properties:
                action:
                    type: string
                    description: The change that occurred. One of `created`, `updated`, or `deleted`.
                todo:
                    allOf:
                        - $ref: '#/components/schemas/todo.v1.Todo'
                    description: |-
                        The todo item after the change. For `deleted` events only the id field
                         is guaranteed to be populated.
                eventTime:
                    type: string
                    description: Time at which the change was observed by the server.
                    format: date-time
            description: |-
                TodoEvent is a server-sent message describing a change to a todo item.
                 It is emitted by both WatchTodos and SyncTodos streams.
        todo.v1.TodoSet:
            type: object
            properties:
                todos:
                    type: array
                    items:
                        $ref: '#/components/schemas/todo.v1.Todo'
                    description: The page of todo items in the order requested by ListTodosRequest.order_by.
                nextPageToken:
                    type: string
                    description: |-
                        Token used to retrieve the next page via ListTodosRequest.page_token.
                         Empty when there are no more results.
            description: TodoSet is a paginated collection of todo items returned by ListTodos.
