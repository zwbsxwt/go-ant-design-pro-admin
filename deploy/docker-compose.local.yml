services:
  mysql:
    image: mysql:8.4
    container_name: go-ant-admin-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: go_ant_design_pro_admin
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ../server/admin-service/internal/data/migrations/001_init_rbac.sql:/docker-entrypoint-initdb.d/01_init_rbac.sql:ro
      - ../server/admin-service/internal/data/seeds/001_seed_rbac.sql:/docker-entrypoint-initdb.d/02_seed_rbac.sql:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -proot --silent",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7.4-alpine
    container_name: go-ant-admin-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  mysql-data:
  redis-data:
