services:
  higress:
    image: higress-registry.cn-hangzhou.cr.aliyuncs.com/higress/all-in-one:latest
    container_name: higress-ai
    restart: unless-stopped
    ports:
      - "${HIGRESS_CONSOLE_PORT:-8001}:8001"
      - "${HIGRESS_HTTP_PORT:-18080}:8080"
      - "${HIGRESS_HTTPS_PORT:-18443}:8443"
    environment:
      GATEWAY_CONCURRENCY: "${HIGRESS_GATEWAY_CONCURRENCY:-2}"
    volumes:
      - ./higress-runtime:/data
    networks:
      - observability

networks:
  observability:
    external: true
    name: template-v6-observability
